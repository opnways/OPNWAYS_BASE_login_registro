services:
  db:
    image: postgres:15-alpine
    container_name: auth-starter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: production
    container_name: auth-starter-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3000
      APP_NAME: ${APP_NAME}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      FRONTEND_URL: ${APP_URL}
      COOKIE_NAME_ACCESS: ${COOKIE_NAME_ACCESS}
      COOKIE_NAME_REFRESH: ${COOKIE_NAME_REFRESH}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      LOGIN_SUCCESS_REDIRECT: ${LOGIN_SUCCESS_REDIRECT}
      LOGOUT_REDIRECT: ${LOGOUT_REDIRECT}
      DEFAULT_AUTH_REDIRECT: ${DEFAULT_AUTH_REDIRECT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      NODE_ENV: production
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: auth-starter-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME}
      VITE_API_URL: ${VITE_API_URL}
      VITE_AUTH_LOGIN_REDIRECT: ${VITE_AUTH_LOGIN_REDIRECT}
      VITE_AUTH_LOGOUT_REDIRECT: ${VITE_AUTH_LOGOUT_REDIRECT}
      VITE_DEFAULT_PUBLIC_ROUTE: ${VITE_DEFAULT_PUBLIC_ROUTE}
    depends_on:
      - backend

volumes:
  postgres_data: